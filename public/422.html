<!doctype html>
<html lang="en">
  <head>
    <title>422 · Unprocessable — PriceTracker</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <style>
      :root {
        --bg: #ffffff; --bg-2: #f5f5f7; --ink: #1d1d1f; --muted: #6e6e73;
        --line: #d2d2d7; --accent: #0071e3; --accent-hover: #0077ed;
        --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", system-ui, sans-serif;
        --mono: "SF Mono", ui-monospace, Menlo, monospace;
      }
      * { box-sizing: border-box; margin: 0; }
      html, body { background: var(--bg); }
      body { font-family: var(--sans); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100dvh; display: grid; place-items: center; padding: 32px; line-height: 1.47; letter-spacing: -0.01em; }
      .frame { width: min(100%, 560px); text-align: center; }
      .brand { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 40px; text-decoration: none; color: var(--ink); }
      .brand-mark { width: 28px; height: 28px; border-radius: 7px; background: var(--ink); color: #fff; font-family: var(--mono); font-weight: 700; font-size: 11px; display: grid; place-items: center; letter-spacing: -0.02em; }
      .brand-name { font-weight: 600; font-size: 15px; letter-spacing: -0.015em; }
      .code { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; }
      h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 600; letter-spacing: -0.025em; margin-bottom: 16px; }
      p { color: var(--muted); font-size: 17px; margin-bottom: 32px; }
      .actions { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
      .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 980px; font-size: 15px; font-weight: 500; text-decoration: none; transition: background 0.2s; }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--line); }
      .btn-ghost:hover { background: var(--bg-2); }
      .glyph { width: 96px; height: 96px; margin: 0 auto 24px; border-radius: 24px; background: var(--bg-2); display: grid; place-items: center; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="frame">
      <a href="/" class="brand">
        <span class="brand-mark">P/T</span>
        <span class="brand-name">PriceTracker</span>
      </a>
      <div class="glyph" aria-hidden="true">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <line x1="12" y1="8" x2="12" y2="13"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <div class="code">Error 422</div>
      <h1>That change couldn't be saved.</h1>
      <p>The request was understood, but something about the data didn't pass validation. Try again, or head back and start over.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Back to products</a>
        <a class="btn btn-ghost" href="javascript:history.back()">Go back</a>
      </div>
    </main>
  </body>
</html>
