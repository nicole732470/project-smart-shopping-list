name: Daily price refresh

# Hits the deployed app's /admin/refresh_prices webhook on a schedule so
# stale product prices are re-scraped without anyone clicking "Fetch latest
# price". Manual runs use full-cycle mode (all batches back-to-back in one
# job). Scheduled cron runs one batch per tick (every 5 min in the 2h window).
#
# Schedule: every 5 minutes during UTC hours 7–8 (~2:00–3:55 AM Chicago CDT).
# During CST (winter), shift to hours 8–9 UTC. GitHub cron is UTC-only.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APP_URL              e.g. https://smart-shoppinglist-6ae31171e85c.herokuapp.com
#   ADMIN_REFRESH_TOKEN  must match the deployed app's ADMIN_REFRESH_TOKEN env var

on:
  schedule:
    - cron: "*/5 7-8 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event_name == 'workflow_dispatch' && 120 || 8 }}

    steps:
      - name: Trigger refresh
        id: trigger
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_REFRESH_TOKEN: ${{ secrets.ADMIN_REFRESH_TOKEN }}
          TRIGGER_SOURCE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'schedule' }}
          REFRESH_MODE: ${{ github.event_name == 'workflow_dispatch' && 'full-cycle' || 'batch' }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$ADMIN_REFRESH_TOKEN" ]; then
            echo "::error::APP_URL and ADMIN_REFRESH_TOKEN secrets must be set."
            exit 1
          fi

          echo "POST $APP_URL/admin/refresh_prices (trigger=$TRIGGER_SOURCE mode=$REFRESH_MODE)"
          http_code=$(curl --silent --show-error --output /tmp/refresh_body \
               --write-out "%{http_code}" \
               --max-time 30 \
               -X POST "$APP_URL/admin/refresh_prices" \
               -H "X-Admin-Token: $ADMIN_REFRESH_TOKEN" \
               -H "X-Trigger-Source: $TRIGGER_SOURCE" \
               -H "X-Refresh-Mode: $REFRESH_MODE" \
               -H "Accept: application/json")
          echo "HTTP $http_code"
          cat /tmp/refresh_body
          echo

          if [ "$http_code" -ne 202 ] && [ "$http_code" -ne 200 ]; then
            exit 1
          fi

          run_id=$(python3 -c "import json; print(json.load(open('/tmp/refresh_body'))['run_id'])")
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "refresh_mode=$REFRESH_MODE" >> "$GITHUB_OUTPUT"

      - name: Wait for completion
        id: wait
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_REFRESH_TOKEN: ${{ secrets.ADMIN_REFRESH_TOKEN }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
          REFRESH_MODE: ${{ steps.trigger.outputs.refresh_mode }}
        run: |
          set -euo pipefail
          if [ "$REFRESH_MODE" = "full-cycle" ]; then
            deadline=$((SECONDS + 5400))
          else
            deadline=$((SECONDS + 300))
          fi
          status="pending"

          while [ "$SECONDS" -lt "$deadline" ]; do
            http_code=$(curl --silent --show-error --output /tmp/run_status.json \
                 --write-out "%{http_code}" \
                 --max-time 30 \
                 "$APP_URL/admin/refresh_runs/$RUN_ID" \
                 -H "X-Admin-Token: $ADMIN_REFRESH_TOKEN" \
                 -H "Accept: application/json")
            if [ "$http_code" -ne 200 ]; then
              echo "::warning::Poll returned HTTP $http_code"
              sleep 10
              continue
            fi

            status=$(python3 -c "import json; print(json.load(open('/tmp/run_status.json'))['status'])")
            echo "status=$status (elapsed=$((SECONDS))s)"
            case "$status" in
              completed|skipped_overlap|failed) break ;;
            esac
            sleep 10
          done

          echo "final_status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "pending" ] || [ "$status" = "running" ]; then
            echo "::error::Refresh did not finish in time (last status: $status, mode: $REFRESH_MODE)."
            exit 1
          fi

      - name: Write batch report to job summary
        if: always() && steps.trigger.outputs.run_id != ''
        env:
          APP_URL: ${{ secrets.APP_URL }}
          ADMIN_REFRESH_TOKEN: ${{ secrets.ADMIN_REFRESH_TOKEN }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
          FINAL_STATUS: ${{ steps.wait.outputs.final_status }}
        run: |
          if [ ! -f /tmp/run_status.json ] || [ "${FINAL_STATUS:-}" = "pending" ] || [ "${FINAL_STATUS:-}" = "running" ]; then
            http_code=$(curl --silent --show-error --output /tmp/run_status.json \
                 --write-out "%{http_code}" \
                 --max-time 30 \
                 "$APP_URL/admin/refresh_runs/$RUN_ID" \
                 -H "X-Admin-Token: $ADMIN_REFRESH_TOKEN" \
                 -H "Accept: application/json" || true)
            echo "Final poll HTTP $http_code"
          fi

          if [ ! -f /tmp/run_status.json ]; then
            echo "## Price refresh — no status received" >> "$GITHUB_STEP_SUMMARY"
            echo "Run **#$RUN_ID** was enqueued but polling did not return a result." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python3 <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/run_status.json").read_text())
          failures = data.get("failure_details") or []
          summary = data.get("failure_summary") or {}

          def table(title, rows, headers):
              if not rows:
                  return []
              out = [f"### {title}", "", f"| {headers[0]} | {headers[1]} |", "|---|---|"]
              for row in rows:
                  out.append(f"| {row.get('label', '?')} | {row.get('count', 0)} |")
              out.append("")
              return out

          lines = [
              "## Price refresh report",
              "",
              f"| Field | Value |",
              f"|-------|-------|",
              f"| Run ID | `{data.get('id')}` |",
              f"| Trigger | `{data.get('triggered_by')}` |",
              f"| Status | **{data.get('status')}** |",
              f"| Batches run | {data.get('batches_run', 1)} |",
              f"| Enqueued | {data.get('enqueued_at') or '—'} |",
              f"| Started | {data.get('started_at') or '—'} |",
              f"| Finished | {data.get('finished_at') or '—'} |",
              f"| Duration | {data.get('duration_seconds', '—')}s |",
              f"| Refreshable catalog | {data.get('total_products', '—')} |",
              f"| URLs with source (all accounts) | {data.get('catalog_with_url', '—')} |",
              f"| Per-batch limit | {data.get('batch_size', '—')} |",
              f"| Attempted | {data.get('attempted', 0)} |",
              f"| Succeeded | {data.get('succeeded', 0)} |",
              f"| Failed | {data.get('failed', 0)} |",
              f"| Stale remaining | {data.get('stale_remaining', '—')} |",
              "",
          ]

          if data.get("error_message"):
              lines += ["### Job error", "", "```", data["error_message"], "```", ""]

          if summary:
              total_logged = summary.get("total_failures")
              if total_logged is not None:
                  lines += [f"**Failure breakdown** (aggregated across all {data.get('failed', 0)} failed attempts)", ""]
              lines += table("By category", summary.get("by_category") or [], ["Category", "Count"])
              lines += table("By host", summary.get("by_host") or [], ["Host", "Count"])
              lines += table("By exact error", summary.get("by_error") or [], ["Error", "Count"])

          if failures:
              lines += ["### Sample failures (click URL to test in browser)", ""]
              has_url = any(item.get("source_url") for item in failures)
              if has_url:
                  lines += ["| ID | Product | Account | Error | URL |", "|---:|---|---|---|---|"]
                  for item in failures[:40]:
                      pid = item.get("product_id", "?")
                      name = (item.get("name") or "?").replace("|", "/")
                      account = (item.get("user_email") or "?").replace("|", "/")
                      err = (item.get("category") or item.get("error") or "?").replace("|", "/")
                      url = item.get("source_url") or "—"
                      if url != "—":
                          url_cell = f"[open]({url}) `{url}`"
                      else:
                          url_cell = "—"
                      lines.append(f"| {pid} | {name} | {account} | {err} | {url_cell} |")
              else:
                  lines += [
                      "_This run was recorded before URL fields were added. Deploy the latest code and re-run, or query_",
                      "`GET /admin/refresh_runs/<id>` _after deploy — samples include `source_url`._",
                      "",
                  ]
                  for item in failures[:30]:
                      pid = item.get("product_id", "?")
                      name = item.get("name", "?")
                      err = item.get("error", "?")
                      lines.append(f"- **#{pid}** {name}: {err}")
              if len(failures) > 40:
                  lines.append("")
                  lines.append(f"_… {len(failures) - 40} more samples in artifact `refresh-run-{data.get('id')}.json`_")
              lines.append("")
          elif data.get("status") == "skipped_overlap":
              lines += ["### Note", "", "Previous batch was still running; this tick was skipped.", ""]

          print("\n".join(lines))
          PY

          cp /tmp/run_status.json "/tmp/refresh-run-${RUN_ID}.json"

      - name: Upload full run report
        if: always() && steps.trigger.outputs.run_id != ''
        uses: actions/upload-artifact@v4
        with:
          name: refresh-run-${{ steps.trigger.outputs.run_id }}
          path: /tmp/refresh-run-${{ steps.trigger.outputs.run_id }}.json
          if-no-files-found: ignore

      - name: Fail on job error
        if: steps.wait.outputs.final_status == 'failed'
        run: |
          echo "Refresh ended with status: ${{ steps.wait.outputs.final_status }}"
          exit 1
